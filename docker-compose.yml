version: '3.8'

services:
  config-read:
    build:
      context: .
      dockerfile: Dockerfile
    image: config-read:local
    container_name: config-read
    volumes:
      - ./examples:/home/configread/examples:ro
      - config-read-config:/home/configread/.config
    environment:
      - PAGER=less -R -F -X
      - CONFIG_READ_THEME=fruity
      - CONFIG_READ_PAGER_ENABLED=true
    stdin_open: true
    tty: true
    # Example command to read a config file
    # command: ["examples/config.yaml", "--theme", "dracula"]

volumes:
  config-read-config:
    driver: local
